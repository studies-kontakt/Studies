<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport-Anfrage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:'Roboto',sans-serif; background:#f4f6f8; color:#333; min-height:100vh;}
a{text-decoration:none;color:inherit;}
/* HEADER */
.Kopfzeile { position: fixed; top:0; left:0; right:0; padding: 15px 30px; display:flex; justify-content:space-between; align-items:center; background-color: #ffffffcc; box-shadow:0 4px 20px rgba(0,0,0,0.08); border-bottom-left-radius:12px; border-bottom-right-radius:12px; backdrop-filter: blur(5px); z-index:1000; }
.Logo{height:100px;}
.nav-links{display:flex;align-items:center;gap:20px;font-weight:500;}
.Kopfzeile-Link{font-size:16px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:0.3s;}
.Kopfzeile-Link:hover{background:#e0f0ff;color:#0077cc;}
.dropdown{position:relative;}
.dropdown-btn{cursor:pointer;}
.dropdown-content{ display:none;position:absolute;top:36px;right:0;background:white; min-width:170px;border-radius:10px;box-shadow:0 6px 15px rgba(0,0,0,0.1);overflow:hidden;z-index:999; }
.dropdown-content a{display:block;padding:12px 15px;transition:0.2s;}
.dropdown-content a:hover{background:#e0f0ff;color:#0077cc;}
@media(min-width:769px){.dropdown:hover .dropdown-content{display:block;}}
.menu-button{display:none;flex-direction:column;cursor:pointer;width:30px;height:22px;justify-content:space-between;}
.menu-button div{width:100%;height:3px;background:#0077cc;border-radius:2px;transition:0.3s;}
@media(max-width:768px){ 
  .nav-links{display:none;flex-direction:column;position:absolute;top:70px;right:20px;background:white;padding:15px;border-radius:12px;width:200px;box-shadow:0 6px 15px rgba(0,0,0,0.12);} 
  .nav-links.active{display:flex;} 
  .menu-button{display:flex;} 
  .dropdown-content{position:relative;box-shadow:none;top:0;margin-left:10px;} 
}
.menu-button.open div:nth-child(1){transform:rotate(45deg) translateY(8px);}
.menu-button.open div:nth-child(2){opacity:0;}
.menu-button.open div:nth-child(3){transform:rotate(-45deg) translateY(-8px);}

/* CONTENT */
.center-content{margin:130px 20px 40px;text-align:center;}
.center-text{font-size:18px;margin-bottom:30px;color:#555;}
.form-container{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);max-width:700px;margin:0 auto;text-align:left;}
label{display:block;font-weight:500;margin-bottom:6px;}
input[type=text], input[type=date], input[type=time]{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:16px;outline:none;transition:0.3s; margin-bottom:15px;}
input:focus{border-color:#0077cc;box-shadow:0 0 8px rgba(0,119,204,0.2);}
.adresse-gruppe,.plz-stadt{display:grid;gap:15px;margin-bottom:15px;}
.adresse-gruppe{grid-template-columns:2fr 1fr;}
.plz-stadt{grid-template-columns:1fr 2fr;}
@media(max-width:600px){.adresse-gruppe,.plz-stadt{grid-template-columns:1fr;}}
button{width:100%;padding:15px;font-size:18px;font-weight:600;color:white;border:none;cursor:pointer;background:linear-gradient(90deg,#0077cc,#00aaff);border-radius:12px;margin-top:20px;transition:0.3s;}
button:hover{background:linear-gradient(90deg,#005fa3,#0099dd);}
h3{margin-bottom:12px;color:#ffffff;font-size:18px;}

/* FOOTER (von der anderen Webseite übernommen) */
.footer { background:#0077cc; padding:40px 20px; color:#fff; margin-top:60px; }
.footer-container { max-width:900px; margin:0 auto; text-align:center; }
.footer h3 {font-size:22px; margin-bottom:10px;}
.footer p {font-size:16px; margin:6px 0;}
.footer-contact a {color:#00e0ff; font-weight:600;}
.footer-contact a:hover {color:white; text-decoration:underline;}
</style>
</head>
<body>

<div class="Kopfzeile">
  <a href="index.html"><img class="Logo" src="/Logo.png" alt="Logo"></a>
  <div class="menu-button" id="menuButton"><div></div><div></div><div></div></div>
  <div class="nav-links" id="navLinks">
    <a class="Kopfzeile-Link" href="index.html">Home</a>
    <div class="dropdown">
      <span class="Kopfzeile-Link dropdown-btn">Service ▾</span>
      <div class="dropdown-content">
        <a href="Umzug.html">Umzug</a>
        <a href="MoebelAufbau.html">Möbel Ab-/Aufbau</a>
        <a href="Transport.html">Transport</a>
      </div>
    </div>
    <a class="Kopfzeile-Link" href="ÜberUns.html">Über uns</a>
    <a class="Kopfzeile-Link" href="Impressum.html">Impressum</a>
  </div>
</div>

<div class="center-content">
  <p class="center-text">
    Sie möchten einen Transport buchen?<br>
    Bitte geben Sie die Abhol- und Zieladresse sowie Datum und Uhrzeit an.
  </p>
  <div class="form-container">
    <label>VON-Adresse:</label>
    <div class="adresse-gruppe">
      <input id="von_strasse" type="text" placeholder="Straße">
      <input id="von_hausnr" type="text" placeholder="Hausnummer">
    </div>
    <div class="plz-stadt">
      <input id="von_plz" type="text" placeholder="PLZ">
      <input id="von_stadt" type="text" placeholder="Stadt">
    </div>

    <label style="margin-top:20px;">NACH-Adresse:</label>
    <div class="adresse-gruppe">
      <input id="nach_strasse" type="text" placeholder="Straße">
      <input id="nach_hausnr" type="text" placeholder="Hausnummer">
    </div>
    <div class="plz-stadt">
      <input id="nach_plz" type="text" placeholder="PLZ">
      <input id="nach_stadt" type="text" placeholder="Stadt">
    </div>

    <label style="margin-top:20px;">Datum:</label>
    <input id="datum" type="date">

    <label>Uhrzeit (von – bis):</label>
    <div class="adresse-gruppe">
      <input id="zeit_von" type="time" placeholder="Von">
      <input id="zeit_bis" type="time" placeholder="Bis">
    </div>

    <button id="absenden" type="button">Transport anfragen</button>
  </div>
</div>

<footer class="footer">
  <div class="footer-container">
    <h3>Kontakt</h3>
    <p>Sie haben Fragen? Kontaktieren Sie uns gerne!</p>
    <div class="footer-contact">
      <p><strong>Email:</strong> <a href="mailto:studies.kontakt@gmail.com">studies.kontakt@gmail.com</a></p>
      <p><strong>Telefon:</strong> <a href="tel:+491782550568">+49 178 2550 568</a></p>
    </div>
  </div>
</footer>

<script>
const menuButton=document.getElementById('menuButton');
const navLinks=document.getElementById('navLinks');
menuButton.addEventListener('click',()=>{
  navLinks.classList.toggle('active');
  menuButton.classList.toggle('open');
});
document.querySelector('.dropdown-btn').addEventListener('click',function(){
  if(window.innerWidth<=768){
    const content=this.nextElementSibling;
    content.style.display=content.style.display==="block"?"none":"block";
  }
});

// Button -> review.html
document.getElementById('absenden').addEventListener('click',()=>{
  const data={
    von_strasse: von_strasse.value,
    von_hausnr: von_hausnr.value,
    von_plz: von_plz.value,
    von_stadt: von_stadt.value,
    nach_strasse: nach_strasse.value,
    nach_hausnr: nach_hausnr.value,
    nach_plz: nach_plz.value,
    nach_stadt: nach_stadt.value,
    datum: datum.value,
    zeit_von: zeit_von.value,
    zeit_bis: zeit_bis.value
  };
  sessionStorage.setItem('transportData', JSON.stringify(data));
  window.location.href="review_transport.html";
});
</script>
</body>
</html>
